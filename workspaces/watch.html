<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Watch</title>
  <link rel="stylesheet" href="/core/theme.css">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; background: var(--void); color: var(--text-hi); font-family: var(--font); font-size: 13px; }
    #app { display: flex; flex-direction: column; height: 100%; }

    /* ── Header ── */
    .header {
      display: flex; align-items: center; gap: var(--space-sm);
      padding: var(--space-sm) var(--space-md);
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }
    .header h1 { font-size: var(--text-base); font-weight: 500; }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--text-dim);
      flex-shrink: 0;
    }
    .status-dot.active { background: var(--green); }
    .status-text { color: var(--text-mid); font-size: var(--text-sm); margin-left: auto; }
    .stop-btn {
      background: var(--red); color: var(--void); border: none; border-radius: 4px;
      padding: 2px 10px; font-family: var(--font); font-size: var(--text-xs);
      cursor: pointer; font-weight: 500; margin-left: auto;
    }
    .stop-btn:hover { opacity: 0.85; }

    /* ── Search ── */
    .search-bar {
      padding: var(--space-sm) var(--space-md);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .search-bar input {
      width: 100%; padding: var(--space-xs) var(--space-sm);
      background: var(--surface-2); border: 1px solid var(--border); border-radius: 4px;
      color: var(--text-hi); font-family: var(--font); font-size: var(--text-sm);
      outline: none;
    }
    .search-bar input:focus { border-color: var(--accent); }
    .search-bar input::placeholder { color: var(--text-dim); }

    /* ── Window list ── */
    .window-list {
      flex: 1; overflow-y: auto; padding: var(--space-xs) 0;
    }
    .window-item {
      display: flex; align-items: center; gap: var(--space-sm);
      padding: var(--space-sm) var(--space-md);
      cursor: pointer; border-bottom: 1px solid transparent;
      transition: background var(--duration-fast) var(--ease-out);
    }
    .window-item:hover { background: var(--surface-2); }
    .window-icon {
      width: 24px; height: 24px; border-radius: 4px;
      background: var(--surface-3); display: flex; align-items: center; justify-content: center;
      font-size: 11px; color: var(--text-mid); flex-shrink: 0;
    }
    .window-info { flex: 1; min-width: 0; }
    .window-title {
      font-size: var(--text-sm); color: var(--text-hi);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .window-process {
      font-size: var(--text-xs); color: var(--text-dim);
      font-family: var(--font-mono);
    }
    .window-watch-btn {
      background: var(--accent); color: var(--void); border: none; border-radius: 4px;
      padding: 2px 10px; font-family: var(--font); font-size: var(--text-xs);
      cursor: pointer; font-weight: 500; opacity: 0;
      transition: opacity var(--duration-fast);
    }
    .window-item:hover .window-watch-btn { opacity: 1; }

    /* ── Preview (watching state) ── */
    .preview {
      flex: 1; display: flex; flex-direction: column;
      overflow: hidden;
    }
    .preview img {
      flex: 1; width: 100%; object-fit: contain;
      background: #000;
    }
    .preview-info {
      padding: var(--space-xs) var(--space-md);
      font-size: var(--text-xs); color: var(--text-dim);
      border-top: 1px solid var(--border);
      display: flex; justify-content: space-between;
    }

    /* ── Empty state ── */
    .empty {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: var(--text-dim); gap: var(--space-sm);
    }
    .empty-icon { font-size: 32px; opacity: 0.3; }
    .empty-text { font-size: var(--text-sm); text-align: center; line-height: 1.5; }

    /* ── States ── */
    .hidden { display: none !important; }
    .loading { color: var(--text-mid); padding: var(--space-lg); text-align: center; }
  </style>
</head>
<body>
  <div id="app">
    <!-- Header -->
    <div class="header">
      <div class="status-dot" id="statusDot"></div>
      <h1>Watch</h1>
      <span class="status-text" id="statusText">Not watching</span>
      <button class="stop-btn hidden" id="stopBtn" onclick="stopWatching()">Stop</button>
    </div>

    <!-- Picker view (not watching) -->
    <div id="pickerView">
      <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Search windows..." oninput="filterWindows()">
      </div>
      <div class="window-list" id="windowList">
        <div class="loading">Loading windows...</div>
      </div>
    </div>

    <!-- Preview view (watching) -->
    <div id="previewView" class="hidden">
      <div class="preview">
        <img id="previewImg" src="" alt="Window capture">
        <div class="preview-info">
          <span id="previewTitle"></span>
          <span id="previewTime"></span>
        </div>
      </div>
    </div>
  </div>

  <script src="/core/capture.js"></script>
  <script>
    var windows = [];
    var watching = false;
    var ws = null;

    // ── WebSocket for live updates ──
    function connectWS() {
      var protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(protocol + '//' + location.host);
      ws.onopen = function() {
        ws.send(JSON.stringify({ type: 'register', role: 'watch-ui' }));
      };
      ws.onmessage = function(e) {
        var msg;
        try { msg = JSON.parse(e.data); } catch { return; }
        if (msg.type === 'watch-capture') refreshPreview();
        if (msg.type === 'watch-stopped') onWatchStopped();
      };
      ws.onclose = function() { setTimeout(connectWS, 2000); };
    }
    connectWS();

    // ── Load windows ──
    async function loadWindows() {
      try {
        var res = await fetch('/api/watch/windows');
        windows = await res.json();
        renderWindows();
      } catch (e) {
        document.getElementById('windowList').innerHTML =
          '<div class="empty"><div class="empty-text">Failed to list windows</div></div>';
      }
    }

    function renderWindows() {
      var list = document.getElementById('windowList');
      var query = document.getElementById('searchInput').value.toLowerCase();

      var filtered = windows.filter(function(w) {
        if (!query) return true;
        return w.title.toLowerCase().includes(query) ||
               (w.process || '').toLowerCase().includes(query);
      });

      if (filtered.length === 0) {
        list.innerHTML = '<div class="empty"><div class="empty-text">No windows found</div></div>';
        return;
      }

      list.innerHTML = filtered.map(function(w) {
        var icon = getAppIcon(w.process, w.title);
        var proc = w.process ? w.process.replace('.exe', '') : '';
        return '<div class="window-item" onclick="startWatching(' + w.hwnd + ')">' +
          '<div class="window-icon">' + icon + '</div>' +
          '<div class="window-info">' +
            '<div class="window-title" title="' + escHtml(w.title) + '">' + escHtml(w.title) + '</div>' +
            (proc ? '<div class="window-process">' + escHtml(proc) + '</div>' : '') +
          '</div>' +
          '<button class="window-watch-btn">Watch</button>' +
        '</div>';
      }).join('');
    }

    function getAppIcon(proc, title) {
      proc = (proc || '').toLowerCase();
      if (proc.includes('chrome')) return 'CH';
      if (proc.includes('firefox')) return 'FF';
      if (proc.includes('edge')) return 'ED';
      if (proc.includes('code')) return 'VS';
      if (proc.includes('excel') || title.toLowerCase().includes('excel')) return 'XL';
      if (proc.includes('winword') || title.toLowerCase().includes('word')) return 'W';
      if (proc.includes('powerpnt') || title.toLowerCase().includes('powerpoint')) return 'PP';
      if (proc.includes('notepad')) return 'NP';
      if (proc.includes('explorer')) return 'EX';
      if (proc.includes('terminal') || proc.includes('cmd') || proc.includes('powershell')) return '>';
      return proc.slice(0, 2).toUpperCase() || '?';
    }

    function filterWindows() { renderWindows(); }

    function escHtml(s) {
      var d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    // ── Start / Stop watching ──
    async function startWatching(hwnd) {
      try {
        var res = await fetch('/api/watch/start', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ hwnd: hwnd, interval: 3 }),
        });
        var data = await res.json();
        if (data.ok || data.status === 'watching') {
          watching = true;
          showPreview(data.title || 'Window ' + hwnd);
        }
      } catch (e) {
        console.error('Failed to start watching:', e);
      }
    }

    async function stopWatching() {
      try {
        await fetch('/api/watch/stop', { method: 'POST' });
      } catch (e) { /* ignore */ }
      onWatchStopped();
    }

    function showPreview(title) {
      document.getElementById('pickerView').classList.add('hidden');
      document.getElementById('previewView').classList.remove('hidden');
      document.getElementById('stopBtn').classList.remove('hidden');
      document.getElementById('statusDot').classList.add('active');
      document.getElementById('statusText').textContent = 'Watching';
      document.getElementById('previewTitle').textContent = title;
      refreshPreview();
    }

    function onWatchStopped() {
      watching = false;
      document.getElementById('pickerView').classList.remove('hidden');
      document.getElementById('previewView').classList.add('hidden');
      document.getElementById('stopBtn').classList.add('hidden');
      document.getElementById('statusDot').classList.remove('active');
      document.getElementById('statusText').textContent = 'Not watching';
      loadWindows(); // refresh list
    }

    function refreshPreview() {
      var img = document.getElementById('previewImg');
      img.src = '/api/files/snapshots/watch/latest.png?t=' + Date.now();
      document.getElementById('previewTime').textContent = new Date().toLocaleTimeString();
    }

    // ── Check initial status ──
    async function checkStatus() {
      try {
        var res = await fetch('/api/watch/status');
        var data = await res.json();
        if (data.active) {
          watching = true;
          showPreview(data.title || 'Unknown window');
        } else {
          loadWindows();
        }
      } catch {
        loadWindows();
      }
    }

    // ── Capture integration ──
    Capture.init({
      interval: 30000,
      getContext: function() {
        return {
          workspace: 'watch',
          watching: watching,
          title: watching ? document.getElementById('previewTitle').textContent : null,
        };
      },
    });

    Capture.registerCommands({
      'list-windows': async function() {
        var res = await fetch('/api/watch/windows');
        return await res.json();
      },
      'start-watch': async function(params) {
        if (params.hwnd) {
          await startWatching(params.hwnd);
          return { ok: true };
        }
        // Search by title
        if (params.title) {
          var res = await fetch('/api/watch/windows');
          var wins = await res.json();
          var match = wins.find(function(w) {
            return w.title.toLowerCase().includes(params.title.toLowerCase());
          });
          if (match) {
            await startWatching(match.hwnd);
            return { ok: true, matched: match.title, hwnd: match.hwnd };
          }
          return { error: 'No window matching: ' + params.title };
        }
        return { error: 'Provide hwnd or title' };
      },
      'stop-watch': async function() {
        await stopWatching();
        return { ok: true };
      },
      'get-status': async function() {
        var res = await fetch('/api/watch/status');
        return await res.json();
      },
    });

    // ── Init ──
    checkStatus();
  </script>
</body>
</html>
