<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CircuitJS</title>
  <link rel="stylesheet" href="/core/theme.css">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; background: var(--void); color: var(--text-hi); font-family: var(--font); font-size: 12px; }
    #app { display: flex; flex-direction: column; height: 100%; }
    #bar {
      flex: 0 0 auto;
      display: flex; align-items: center; gap: 8px;
      padding: 6px 10px; border-bottom: 1px solid var(--border); background: var(--surface);
      font-size: 11px; color: var(--text-mid);
    }
    #bar .title { color: var(--text-hi); font-weight: 500; }
    #bar .file-name { color: var(--accent); font-family: var(--font-mono, monospace); font-size: 11px; }
    #bar .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-dim); }
    #bar .dot.ok { background: var(--accent); }
    #bar .save-btn {
      background: none; border: 1px solid var(--border); color: var(--text-2);
      font-family: var(--font); font-size: 10px;
      padding: 3px 10px; border-radius: 3px; cursor: pointer;
      transition: all 0.15s;
    }
    #bar .save-btn:hover { color: var(--text); border-color: var(--text-3); }
    #bar .save-btn.dirty { color: var(--accent); border-color: var(--accent); }
    #bar .note { margin-left: auto; color: var(--text-dim); }
    #bar a { color: var(--text-mid); text-decoration: none; border-bottom: 1px dotted var(--text-dim); }
    #bar a:hover { color: var(--text-hi); }
    #frame { flex: 1; width: 100%; border: none; background: #fff; }
  </style>
</head>
<body>
  <div id="app">
    <div id="bar">
      <span class="dot" id="status-dot"></span>
      <span class="title">CircuitJS</span>
      <span class="file-name" id="file-name"></span>
      <button class="save-btn" id="save-btn" style="display:none">Save</button>
      <span class="note">hosted by <a href="https://www.falstad.com/circuit/" target="_blank" rel="noopener">falstad.com</a></span>
    </div>
    <iframe id="frame" src="about:blank"></iframe>
  </div>

  <script src="/core/capture.js"></script>
  <script>
    // Loads a .circuit file (small JSON envelope) when ?file=path is provided,
    // otherwise opens a bare Falstad iframe. Save serialises share_url +
    // notes back to the file.
    //
    // .circuit format:
    //   { "share_url": "<full Falstad share URL>",
    //     "netlist":   "<raw Falstad text netlist>",
    //     "notes":     "<freeform notes>" }
    //
    // share_url wins if present; otherwise netlist; otherwise default Falstad.
    (function () {
      var FALSTAD_BASE = 'https://www.falstad.com/circuit/circuitjs.html';
      var FALSTAD_ORIGIN = 'https://www.falstad.com';

      var frame = document.getElementById('frame');
      var statusDot = document.getElementById('status-dot');
      var saveBtn = document.getElementById('save-btn');
      var fileNameEl = document.getElementById('file-name');

      var params = new URLSearchParams(location.search);
      var filePath = params.get('file');
      var fileData = { share_url: '', netlist: '', notes: '' };

      function buildFrameUrl(data) {
        // share_url takes precedence
        if (data.share_url && data.share_url.trim()) {
          return data.share_url.trim();
        }
        if (data.netlist && data.netlist.trim()) {
          return FALSTAD_BASE + '?cct=' + encodeURIComponent(data.netlist.trim());
        }
        // Fall through to query-string options the workspace launcher may pass
        var p = new URLSearchParams();
        if (params.get('cct')) p.set('cct', params.get('cct'));
        if (params.get('ctz')) p.set('ctz', params.get('ctz'));
        if (params.get('startCircuit')) p.set('startCircuit', params.get('startCircuit'));
        var qs = p.toString();
        return qs ? FALSTAD_BASE + '?' + qs : FALSTAD_BASE;
      }

      function loadFrame(data) {
        frame.src = buildFrameUrl(data);
      }

      frame.addEventListener('load', function () {
        statusDot.classList.add('ok');
      });

      // ── File mode ─────────────────────────────────────────────
      if (filePath) {
        fileNameEl.textContent = filePath;
        saveBtn.style.display = 'inline-block';

        fetch('/api/files/files/' + filePath.split('/').map(encodeURIComponent).join('/'))
          .then(function (r) { return r.text(); })
          .then(function (text) {
            try {
              fileData = Object.assign({ share_url: '', netlist: '', notes: '' },
                                       JSON.parse(text || '{}'));
            } catch (e) {
              console.warn('[circuitjs] could not parse', filePath, e);
            }
            loadFrame(fileData);
          })
          .catch(function (err) {
            console.warn('[circuitjs] failed to load', filePath, err);
            loadFrame({});
          });

        saveBtn.addEventListener('click', function () {
          var url = window.prompt(
            'Paste Falstad share URL (File → Export Link → Copy to Clipboard).\n' +
            'Leave blank to keep current.',
            fileData.share_url || ''
          );
          if (url === null) return;
          if (url.trim()) fileData.share_url = url.trim();
          var text = JSON.stringify(fileData, null, 2);
          fetch('/api/files/files/' + filePath.split('/').map(encodeURIComponent).join('/'), {
            method: 'PUT',
            body: text,
            headers: { 'Content-Type': 'application/json' },
          }).then(function (r) {
            if (r.ok) {
              saveBtn.classList.remove('dirty');
              saveBtn.textContent = 'Saved';
              setTimeout(function () { saveBtn.textContent = 'Save'; }, 1200);
              if (fileData.share_url) loadFrame(fileData);
            } else {
              alert('Save failed: ' + r.status);
            }
          });
        });
      } else {
        // Stand-alone mode (Files → Tools button or direct workspace open)
        loadFrame({});
      }

      // ── Capture for agent visibility ──────────────────────────
      if (typeof Capture !== 'undefined') {
        Capture.init({
          interval: 30000,
          getContext: function () {
            return { workspace: 'circuitjs', file: filePath || null };
          },
        });
      }
    })();
  </script>
</body>
</html>
